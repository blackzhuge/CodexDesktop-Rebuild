name: Sync Upstream & Patch

on:
  schedule:
    - cron: "0 8 * * *" # Daily 08:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even without version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            echo "Forced sync requested."
            exit 0
          fi

          RESULT=$(node scripts/check-update.js --json --force)
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          RESULT="$RESULT" CURRENT_VERSION="$CURRENT_VERSION" node << 'NODE'
          const fs = require("fs");
          const data = JSON.parse(process.env.RESULT);
          const currentVersion = process.env.CURRENT_VERSION;
          const targetPlatforms = ["macOS-arm64", "Windows"];
          const normalizeVersion = (version) => version.replace(/\.0$/, "");
          const missing = targetPlatforms.filter((name) => !data.platforms?.[name]?.version);
          if (missing.length > 0) {
            throw new Error(`Missing upstream version: ${missing.join(", ")}`);
          }

          const updates = targetPlatforms
            .map((name) => ({ name, version: data.platforms?.[name]?.version || "" }))
            .filter((item) => item.version && normalizeVersion(item.version) !== normalizeVersion(currentVersion));

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_update=${updates.length > 0}\n`);

          if (updates.length > 0) {
            for (const item of updates) {
              console.log(`${item.name}: ${currentVersion} -> ${item.version}`);
            }
          } else {
            console.log("No upstream update detected.");
          }
          NODE

  # ──────────────────────────────────────────────
  # Each platform: sync + patch + build in one job
  # (src/ is gitignored, so it must be generated per-runner)
  # ──────────────────────────────────────────────
  build-mac:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          brew install --quiet sevenzip

      - name: Sync upstream (macOS only)
        run: node scripts/sync-upstream.js --force --skip-win

      - name: Patch
        run: node scripts/patch-all.js mac-${{ matrix.arch }}

      - name: Build
        run: npm run build:mac-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  build-windows:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          choco install 7zip -y

      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Sync upstream (Windows only)
        run: node scripts/sync-upstream.js --force --skip-mac

      - name: Patch
        run: node scripts/patch-all.js win

      - name: Build
        run: npm run build:win-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64
          path: out/*.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [check, build-mac, build-windows]
    if: needs.check.outputs.has_update == 'true' && needs.build-mac.result == 'success' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Get upstream version and tag
        id: version
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          MAC_ARM64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          WIN_VER=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")

          VERSION="${MAC_ARM64:-$WIN_VER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"

          if [ -z "$VERSION" ]; then echo "No version detected"; exit 0; fi

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          git diff --cached --quiet && echo "No version change" && exit 0

          git commit -m "Bump version to ${VERSION}"
          git tag -a "v${VERSION}" -m "Codex ${VERSION}"
          git push origin HEAD --tags

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Create Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Codex ${{ steps.version.outputs.version }}
          body: |
            ## Upstream Versions
            | Platform | Version |
            |----------|---------|
            | macOS arm64 | `${{ steps.version.outputs.mac_arm64 || 'N/A' }}` |
            | Windows x64 | `${{ steps.version.outputs.win_version || 'N/A' }}` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
